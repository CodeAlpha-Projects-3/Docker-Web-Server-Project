<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Containerized Web Server | Task 4</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            border-top: 5px solid var(--primary-color);
        }

        .status-badge {
            background-color: #dcfce7;
            color: #166534;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        h1 {
            margin: 0 0 1rem 0;
            font-size: 2rem;
            color: var(--text-color);
        }

        p {
            line-height: 1.6;
            color: #64748b;
            margin-bottom: 2rem;
        }

        .tech-stack {
            display: flex;
            justify-content: center;
            gap: 1rem;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="status-badge">● Container Status: Running</div>
        <h1>Deployment Successful</h1>
        <p>
            This web server is successfully containerized using <strong>Docker</strong>. 
            It is running an Apache HTTPD service, demonstrating core containerization 
            principles and lifecycle management.
        </p>

        <div class="tech-stack">
            <span>Docker</span> • <span>Apache</span> • <span>DevOps</span>
        </div>

        <div class="footer">
            Project Task 4 | Managed by Muhammad Ahmed
        </div>
    </div>

</body>
</html>
